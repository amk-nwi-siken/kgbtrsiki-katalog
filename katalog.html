<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>kgbtr /b/ - Katalog</title>
    <style>
        body { background: #f0e0c0; color: #4a2c00; font-family: "Trebuchet MS", sans-serif; font-size: 13px; margin: 0; padding: 15px; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #4a2c00; padding-bottom: 10px; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #4a2c00; font-weight: bold; background: #e8d5b0; padding: 5px 10px; border: 1px solid #4a2c00; border-radius: 3px; }
        .back-btn:hover { background: #dfc8a0; }
        #katalog-baslik { text-transform: uppercase; margin: 0; }
        .content-area { text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">← GERİ DÖN</a>
        <h1 id="katalog-baslik">YÜKLENİYOR...</h1>
    </div>
    <div class="content-area">
        <p>Bu kategoriye ait içerikler buraya gelecek.</p>
    </div>
    <script>
        // URL'den kategori bilgisini al
        const urlParams = new URLSearchParams(window.location.search);
        const kategori = urlParams.get('kategori');
        
        // Başlığı güncelle
        if(kategori) {
            document.getElementById('katalog-baslik').innerText = '/' + kategori + '/';
            document.title = 'kgbtr /' + kategori + '/';
        } else {
            document.getElementById('katalog-baslik').innerText = 'KATALOG HATASI';
        }
    </script>
</body>
</html>
