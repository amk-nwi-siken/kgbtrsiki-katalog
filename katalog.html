<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>kgbtr - Katalog</title>
    <style>
        body { margin: 0; padding: 15px; font-family: "Trebuchet MS", Arial, sans-serif; font-size: 13px; color: #f2f2f2; background: linear-gradient(135deg, #000000, #1a0033, #000000); }
        .top-bar { text-align: center; margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #3b1f5c; background: rgba(20, 0, 40, 0.7); border-radius: 8px; }
        .top-bar a { color: #d18cff; text-decoration: none; font-weight: bold; }
        input { padding: 10px; width: 280px; background: rgba(0,0,0,0.5); border: 1px solid #3b1f5c; color: #fff; border-radius: 6px; }
        button { padding: 10px 18px; background: #6b1f9e; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #8b2ecc; }
        .post { border: 1px solid #3b1f5c; margin: 12px auto; padding: 12px; border-radius: 8px; background: rgba(20, 0, 40, 0.4); max-width: 800px; }
        .post h3 { margin: 0 0 8px 0; color: #d18cff; }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="index.html">← GERİ DÖN</a>
    <h1 id="katalog-baslik">KATALOG</h1>
</div>

<div style="margin:20px auto; text-align:center;">
    <input id="title" placeholder="Konu başlığı..." maxlength="120">
    <button id="sendBtn" onclick="send()">Konu Aç</button>
</div>

<div id="posts"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "BURAYA_GERCEK_API_KEY", // Burayı kendi keyinle değiştir
        authDomain: "kgbtr-siki-91359.firebaseapp.com",
        databaseURL: "https://kgbtr-siki-91359-default-rtdb.firebaseio.com",
        projectId: "kgbtr-siki-91359"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const kategori = urlParams.get("kategori") || "b";
    document.getElementById("katalog-baslik").innerText = "/" + kategori + "/";

    function send() {
        const input = document.getElementById("title");
        const btn = document.getElementById("sendBtn");
        const title = input.value.trim();

        if (!title) return alert("Başlık girin!");

        btn.disabled = true;
        btn.innerText = "Gönderiliyor...";

        // .set yerine .push kullanıyoruz (daha güvenli)
        db.ref("posts/" + kategori).push({
            title: title,
            time: new Date().toLocaleString("tr-TR")
        }).then(() => {
            input.value = "";
            btn.disabled = false;
            btn.innerText = "Konu Aç";
        }).catch((err) => {
            console.error(err);
            alert("Hata: " + err.message);
            btn.disabled = false;
            btn.innerText = "Konu Aç";
        });
    }

    function loadPosts() {
        const postsDiv = document.getElementById("posts");
        db.ref("posts/" + kategori).on("value", (snap) => {
            postsDiv.innerHTML = "";
            const data = snap.val();
            if (!data) return postsDiv.innerHTML = "<p style='text-align:center'>Henüz konu yok</p>";

            // Verileri tersine çevirip ekrana bas
            Object.values(data).reverse().forEach(p => {
                const div = document.createElement("div");
                div.className = "post";
                div.innerHTML = `<h3>${p.title}</h3><small>${p.time}</small>`;
                postsDiv.appendChild(div);
            });
        });
    }

    window.onload = loadPosts;
</script>
</body>
</html>
