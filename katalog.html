<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>kgbtr - Katalog</title>
    <style>
        body { 
            margin: 0; padding: 20px; 
            font-family: "Segoe UI", Arial, sans-serif; 
            font-size: 14px; color: #ccc; 
            background: #1a1a1d; 
        }
        .top-bar { 
            text-align: center; margin-bottom: 20px; 
            border-bottom: 2px solid #4a148c; padding-bottom: 10px; 
        }
        .top-bar a { color: #bb86fc; text-decoration: none; font-weight: bold; }
        
        #post-form { 
            background: #252529; padding: 20px; border-radius: 8px; 
            max-width: 600px; margin: 0 auto 20px auto; border: 1px solid #333; 
        }
        input, textarea { 
            width: calc(100% - 22px); padding: 10px; margin-bottom: 10px; 
            background: #121212; border: 1px solid #444; color: #fff; border-radius: 4px; 
        }
        button { 
            background: #6200ee; color: white; border: none; 
            padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; 
        }
        .post { 
            border: 1px solid #333; margin: 15px auto; padding: 15px; 
            border-radius: 8px; background: #252529; max-width: 820px; 
        }
        .post h3 { margin: 0 0 10px 0; color: #e1bee7; }
        .media-container { 
            margin: 12px 0; text-align: center; 
        }
        .media-container iframe {
            width: 100%;
            max-width: 800px;
            height: 480px;
            border: none;
            border-radius: 8px;
            background: #000;
        }
        .delete-btn { 
            color: #cf6679; font-size: 12px; cursor: pointer; float: right; 
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="index.html">← ANA SAYFA</a>
    <h1 id="katalog-baslik">/b/</h1>
</div>

<div id="post-form">
    <input id="title" placeholder="Konu Başlığı...">
    <textarea id="mediaUrl" rows="4" placeholder="Pixeldrain embed kodunu buraya tam olarak yapıştır..."></textarea>
    <button onclick="send()">Gönder</button>
</div>

<div id="posts"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "BURAYA_GERCEK_API_KEY",
        authDomain: "kgbtr-siki-91359.firebaseapp.com",
        databaseURL: "https://kgbtr-siki-91359-default-rtdb.firebaseio.com",
        projectId: "kgbtr-siki-91359"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const kategori = new URLSearchParams(window.location.search).get("kategori") || "3d";

    document.getElementById("katalog-baslik").innerText = "/" + kategori + "/";

    function send() {
        const title = document.getElementById("title").value.trim();
        const content = document.getElementById("mediaUrl").value.trim();
        
        if (!title || !content) return alert("Başlık ve embed kodunu doldur lan!");

        db.ref("posts/" + kategori).push({
            title: title,
            content: content,
            time: new Date().toLocaleString("tr-TR")
        }).then(() => {
            document.getElementById("title").value = "";
            document.getElementById("mediaUrl").value = "";
        }).catch(err => alert("Hata: " + err.message));
    }

    function loadPosts() {
        db.ref("posts/" + kategori).on("value", (snap) => {
            const postsDiv = document.getElementById("posts");
            postsDiv.innerHTML = "";
            const data = snap.val();
            if (!data) return;

            Object.entries(data).reverse().forEach(([id, p]) => {
                let mediaHTML = p.content || "";

                if (mediaHTML.includes("pixeldrain.com") && !mediaHTML.includes("<iframe")) {
                    mediaHTML = `<iframe src="${mediaHTML}" allowfullscreen></iframe>`;
                }

                postsDiv.innerHTML += `
                    <div class="post">
                        <span class="delete-btn" onclick="deletePost('${id}')">[SİL]</span>
                        <h3>${p.title}</h3>
                        <div class="media-container">${mediaHTML}</div>
                        <small>${p.time || ''}</small>
                    </div>`;
            });
        });
    }

    function deletePost(id) {
        if (confirm("Silinsin mi?")) db.ref("posts/" + kategori + "/" + id).remove();
    }

    window.onload = loadPosts;
</script>
</body>
</html>
