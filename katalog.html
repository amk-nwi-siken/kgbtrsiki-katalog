<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>kgbtr /b/ - Katalog</title>
    <style>
        body {
    margin: 0;
    padding: 15px;
    font-family: "Trebuchet MS", sans-serif;
    font-size: 13px;
    color: #f2f2f2;
    background: linear-gradient(135deg, #000000, #1a0033, #000000);
}

.header {
    text-align: center;
    margin-bottom: 25px;
    padding: 15px;
    border-bottom: 1px solid #3b1f5c;
    background: rgba(20, 0, 40, 0.5);
    border-radius: 8px;
}

.header h1 {
    margin: 0;
    color: #d18cff;
}

.catalog {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 1000px;
    margin: auto;
}

.board {
    background: rgba(15, 0, 30, 0.85);
    border: 1px solid #3b1f5c;
    padding: 12px;
    width: 200px;
    text-decoration: none;
    color: #ffffff;
    border-radius: 10px;
    text-align: center;
    transition: 0.2s;
}

.board:hover {
    background: rgba(60, 0, 90, 0.9);
    transform: scale(1.03);
    border-color: #d18cff;
}

.board h2 {
    margin: 0;
    font-size: 16px;
    color: #d18cff;
}
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-btn">← GERİ DÖN</a>
        <h1 id="katalog-baslik">YÜKLENİYOR...</h1>
    </div>
    <div class="content-area">
        <p>Bu kategoriye ait içerikler buraya gelecek.</p>
    </div>
    <script>
        // URL'den kategori bilgisini al
        const urlParams = new URLSearchParams(window.location.search);
        const kategori = urlParams.get('kategori');
        
        // Başlığı güncelle
        if(kategori) {
            document.getElementById('katalog-baslik').innerText = '/' + kategori + '/';
            document.title = 'kgbtr /' + kategori + '/';
        } else {
            document.getElementById('katalog-baslik').innerText = 'KATALOG HATASI';
        }
    </script>
</body>
</html>
