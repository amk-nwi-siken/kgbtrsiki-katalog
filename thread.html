<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Thread</title>

<style>
body {
    margin:0;
    padding:15px;
    font-family: "Trebuchet MS", sans-serif;
    background: linear-gradient(135deg,#000,#1a0033,#000);
    color:#f2f2f2;
}

.box {
    max-width:700px;
    margin:auto;
}

.post {
    border:1px solid #3b1f5c;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    background:rgba(20,0,40,0.3);
}

button {
    margin-top:5px;
}
</style>

</head>

<body>

<div class="box">

    <h2 id="title">Yükleniyor...</h2>

    <input id="comment" placeholder="yorum yaz">
    <button onclick="addComment()">Gönder</button>

    <div id="comments"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const title = params.get("title");

document.getElementById("title").innerText = title;

function addComment() {
    const text = document.getElementById("comment").value;
    if (!text) return;

    const div = document.createElement("div");
    div.className = "post";
    div.innerText = text;

    document.getElementById("comments").prepend(div);

    document.getElementById("comment").value = "";
}

</script>

</body>
</html>
